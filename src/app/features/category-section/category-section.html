<section class="categories">

  <h2>
    Categories
  </h2>

  <div class="grid">

    @for(
      category of categories();
      track category.id
    ){

      <a [routerLink]="['/products',category.id]" class="card">

        <span>
          {{category.icon}}
        </span>

        <h4>
          {{category.name}}
        </h4>

      </a>

    }

  </div>

</section>
