@if(product){

<div class="detail-container">

  <div class="image-section">

      <img
      [src]="product.imageUrl">

  </div>

  <div class="info-section">

      <h1>
        {{product.name}}
      </h1>

      <p>
        {{product.description}}
      </p>

      <h2>
        ₹{{product.price}}
      </h2>

      <button
      (click)="addToCart()">

      Add To Cart

      </button>

  </div>

</div>

}
